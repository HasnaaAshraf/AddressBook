<div class="page-container ">
  <h2 class="mb-4 text-center">Departments</h2>

  <form class="mb-4 row g-3" (ngSubmit)="addDepartment()">
    <div class="col-md-8">
      <input type="text" class="form-control" placeholder="Department Name" [(ngModel)]="newDepartmentName" name="deptName" required>
    </div>
    <div class="col-md-4">
      <button class="btn btn-success w-100" type="submit">Add Department</button>
    </div>
  </form>

  <div class="table-responsive ">
    <table class="table table-striped table-bordered">
      <thead class="table-primary">
        <tr>
          <th>ID</th>
          <th>Department Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
      <tr *ngFor="let dept of departments">
      <td>{{ dept.id }}</td>
      <td>{{ dept.name }}</td>
      <td>
        <button class="btn btn-sm btn-warning me-2" (click)="openEdit(dept)">Edit</button>
        <button class="btn btn-sm btn-danger" (click)="deleteDepartment(dept.id)">Delete</button>
      </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      
      <div class="modal-header">
        <h5 class="modal-title">Edit Department</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="text" class="form-control" [(ngModel)]="selectedDepartment.name" name="editName">
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" (click)="updateDepartment()">Save</button>
      </div>

    </div>
  </div>
</div>
