
<div class="page-container">
  <h2 class="mb-4 text-center">Address Book</h2>

  <form class="mb-4 row g-3" (submit)="search(); $event.preventDefault()">
    <div class="col-md-3">
      <input type="text" class="form-control" placeholder="Full Name" [(ngModel)]="searchModel.fullName" name="fullName">
    </div>
    <div class="col-md-3">
      <input type="text" class="form-control" placeholder="Job Title" [(ngModel)]="searchModel.jobTitle" name="jobTitle">
    </div>
    <div class="col-md-3">
      <input type="text" class="form-control" placeholder="Department" [(ngModel)]="searchModel.department" name="department">
    </div>
    <div class="col-md-3">
      <button class="btn btn-primary w-100">Search</button>
    </div>
  </form>

  <div class="mb-3 d-flex justify-content-between">
    <button class="btn btn-success" (click)="openAddModal()">Add New Entry</button>
    <button class="btn btn-secondary" (click)="exportToExcel()">Export to Excel</button>
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-bordered align-middle">
      <thead class="table-primary">
        <tr>
          <th>Full Name</th>
          <th>Job Title</th>
          <th>Department</th>
          <th>Mobile</th>
          <th>Date of Birth</th>
          <th class="text-center">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let entry of addressList">
          <td>{{ entry.fullName }}</td>
          <td>{{ entry.job?.title }}</td>
          <td>{{ entry.department?.name }}</td>
          <td>{{ entry.mobileNumber }}</td>
          <td>{{ entry.dateOfBirth | date }}</td>
          <td class="text-center">
            <button class="btn btn-sm btn-warning me-2" (click)="openEdit(entry)">Edit</button>
            <button class="btn btn-sm btn-danger" (click)="deleteEntry(entry.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="editEntryModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Address</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" [(ngModel)]="selectedEntry.fullName" name="editFullName">
            </div>
            <div class="col-md-6">
              <label class="form-label">Mobile Number</label>
              <input type="text" class="form-control" [(ngModel)]="selectedEntry.mobileNumber" name="editMobile">
            </div>
            <div class="col-md-6">
            <label class="form-label">Job Title</label>
            <select class="form-control" [(ngModel)]="selectedEntry.jobId" name="editJob">
            <option [ngValue]="null" disabled selected>Select Job</option>
            <option *ngFor="let job of jobs" [ngValue]="job.id">{{ job.title }}</option>
            </select>
            </div>
            <div class="col-md-6">
            <label class="form-label">Department</label>
            <select class="form-control" [(ngModel)]="selectedEntry.departmentId" name="editDepartment">
            <option [ngValue]="null" disabled selected>Select Department</option>
            <option *ngFor="let dept of departments" [ngValue]="dept.id">{{ dept.name }}</option>
            </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Date of Birth</label>
              <input type="date" class="form-control" [(ngModel)]="selectedEntry.dateOfBirth" name="editDob">
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" [(ngModel)]="selectedEntry.email" name="editEmail">
            </div>
            <div class="col-md-12">
              <label class="form-label">Address</label>
              <input type="text" class="form-control" [(ngModel)]="selectedEntry.address" name="editAddress">
            </div>
            <div class="col-md-12">
              <label class="form-label">Photo URL</label>
              <input type="text" class="form-control" [(ngModel)]="selectedEntry.PhotoPath" name="editPhoto">
            </div>
            <div class="col-md-6">
              <label class="form-label">Age</label>
              <input type="number" class="form-control" [(ngModel)]="selectedEntry.age" name="editAge">
            </div>
          </div>
          <button type="button" class="btn btn-primary w-100 mt-4" (click)="saveEdit()">Save Changes</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="addEntryModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-body">
        <form>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" [(ngModel)]="newEntry.fullName" name="addFullName">
            </div>
            <div class="col-md-6">
              <label class="form-label">Mobile Number</label>
              <input type="text" class="form-control" [(ngModel)]="newEntry.mobileNumber" name="addMobile">
            </div>
            <div class="col-md-6">
            <label class="form-label">Job Title</label>
            <select class="form-control" [(ngModel)]="newEntry.jobId" name="addJobId">
            <option *ngFor="let job of jobs" [value]="job.id">{{ job.title }}</option>
            </select>
            </div>
            <div class="col-md-6">
            <label class="form-label">Department</label>
            <select class="form-control" [(ngModel)]="newEntry.departmentId" name="addDepartmentId">
            <option *ngFor="let dept of departments" [value]="dept.id">{{ dept.name }}</option>
            </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Date of Birth</label>
              <input type="date" class="form-control" [(ngModel)]="newEntry.dateOfBirth" name="addDob">
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" [(ngModel)]="newEntry.email" name="addEmail">
            </div>
            <div class="col-md-12">
              <label class="form-label">Address</label>
              <input type="text" class="form-control" [(ngModel)]="newEntry.address" name="addAddress">
            </div>
            <div class="col-md-12">
              <label class="form-label">Photo URL</label>
              <input type="text" class="form-control" [(ngModel)]="newEntry.PhotoPath" name="addPhoto">
            </div>
            <div class="col-md-6">
              <label class="form-label">Age</label>
              <input type="number" class="form-control" [(ngModel)]="newEntry.age" name="addAge">
            </div>
          </div>
          <button type="button" class="btn btn-success w-100 mt-4" (click)="saveNewEntry()">Add Entry</button>
        </form>
      </div>
    </div>
  </div>
</div>
