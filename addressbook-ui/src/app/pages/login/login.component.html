<div class="login-bg d-flex align-items-center justify-content-center">
  <div class="bg-overlay"></div>
  <div class="login-overlay p-4 rounded shadow">
    <h2 class="text-center mb-4">Login</h2>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <input type="text" class="form-control mb-3" placeholder="Enter Your Username..." formControlName="username" required >
      
      <input type="password" class="form-control mb-3" placeholder="Enter Your Password..." formControlName="password" required >
      
      <button type="submit" class="btn btn-primary w-100">Login</button>

      <p class="text-danger mt-2" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>
  </div>
</div>
